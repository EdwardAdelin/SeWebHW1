<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Skill-Based Recommendations</title>
</head>
<body>
    <h2>Recommendations based on First User's Skill Level</h2>
    
    <div th:if="${#lists.isEmpty(recommendedRecipes)}">
        <p>No recipes found matching the user's skill level.</p>
    </div>

    <ul th:if="${not #lists.isEmpty(recommendedRecipes)}">
        <li th:each="recipe : ${recommendedRecipes}">
            <strong th:text="${recipe.title}">Recipe Title</strong> 
            (<span th:text="${recipe.difficulty}">Difficulty</span>)
        </li>
    </ul>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
