<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New User</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Add a New User (Task 5)</h2>
        <form th:action="@{/add-user}" method="post" class="card p-4 shadow-sm">
            
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Jane" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Surname</label>
                <input type="text" name="surname" class="form-control" placeholder="e.g. Smith" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Cooking Skill Level</label>
                <select name="skillLevel" class="form-select" required>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Preferred Cuisine Type</label>
                <input type="text" name="preferredCuisine" class="form-control" placeholder="e.g. Asian" required>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success">Save User</button>
                <a href="/recipes" class="btn btn-outline-secondary">Back to List</a>
            </div>
            
        </form>
    </div>
</div>
</body>
</html>
