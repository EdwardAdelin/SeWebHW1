<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select User for XSLT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6 card p-4 shadow-sm">
        <h2>XSLT Recipe View (Tasks 8 & 11)</h2>
        <p>Select a user to highlight recipes matching their skill level.</p>
        <form th:action="@{/recipes-xsl}" method="get" class="mt-3">
            <div class="mb-3">
                <label class="form-label">Type User Name (e.g., John, Ade)</label>
                <input type="text" name="userName" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100">View via XSLT</button>
        </form>
    </div>
</div>
</body>
</html>
