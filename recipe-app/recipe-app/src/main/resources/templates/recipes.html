<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recipe Book</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 rounded">
  <div class="container-fluid">
    <a class="navbar-brand" href="/recipes">RecipeApp</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/recipes">All Recipes</a></li>
        <li class="nav-item"><a class="nav-link" href="/search-cuisine">Search Cuisine</a></li>
        <li class="nav-item"><a class="nav-link" href="/add-recipe">Add Recipe</a></li>
        <li class="nav-item"><a class="nav-link" href="/add-user">Add User</a></li>
        <li class="nav-item"><a class="nav-link" href="/select-user-xsl">XSLT View</a></li>
      </ul>
    </div>
  </div>
</nav>

<h1 class="mb-4">All Recipes (Task 3)</h1>

<table class="table table-striped table-hover">
    <thead class="table-dark">
    <tr>
        <th>Title</th>
        <th>Cuisines</th>
        <th>Difficulty</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="recipe : ${recipes}">
        <td>
        <a th:href="@{/recipe-details(title=${recipe.title})}" th:text="${recipe.title}"></a>
        </td>
        <td>
            <span th:each="c : ${recipe.cuisines}" class="badge bg-primary me-1" th:text="${c}"></span>
        </td>
        <td th:text="${recipe.difficulty}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
