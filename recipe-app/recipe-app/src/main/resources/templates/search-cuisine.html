<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search by Cuisine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 rounded">
  <div class="container-fluid">
    <a class="navbar-brand" href="/recipes">RecipeApp</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/recipes">All Recipes</a></li>
        <li class="nav-item"><a class="nav-link" href="/search-cuisine">Search Cuisine</a></li>
        <li class="nav-item"><a class="nav-link" href="/add-recipe">Add Recipe</a></li>
        <li class="nav-item"><a class="nav-link" href="/add-user">Add User</a></li>
        <li class="nav-item"><a class="nav-link" href="/select-user-xsl">XSLT View</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="row justify-content-center">
    <div class="col-md-6 card p-4 shadow-sm">
        <h2>Find Recipes by Cuisine (Task 10)</h2>
        <form th:action="@{/recipes/cuisine}" method="get" class="mt-3">
            <div class="mb-3">
                <label class="form-label">Select Cuisine Type</label>
                <select name="cuisine" class="form-select">
                    <option value="Italian">Italian</option>
                    <option value="Asian">Asian</option>
                    <option value="French">French</option>
                    <option value="Mexican">Mexican</option>
                    <option value="Indian">Indian</option>
                    <option value="Mediterranean">Mediterranean</option>
                    <option value="Romanian">Romanian</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Search Recipes</button>
        </form>
    </div>
</div>
</body>
</html>
