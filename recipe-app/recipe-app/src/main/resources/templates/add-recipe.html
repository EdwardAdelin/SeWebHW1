<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Recipe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 rounded">
  <div class="container-fluid">
    <a class="navbar-brand" href="/recipes">RecipeApp</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/recipes">All Recipes</a></li>
        <li class="nav-item"><a class="nav-link" href="/search-cuisine">Search Cuisine</a></li>
        <li class="nav-item"><a class="nav-link" href="/add-recipe">Add Recipe</a></li>
        <li class="nav-item"><a class="nav-link" href="/add-user">Add User</a></li>
        <li class="nav-item"><a class="nav-link" href="/select-user-xsl">XSLT View</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Add a New Recipe (Task 4)</h2>
        <form th:action="@{/add-recipe}" method="post" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">Recipe Title</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Autumn Soup" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Cuisine Type 1</label>
                <select name="cuisine1" class="form-select" required>
                    <option value="" disabled selected>Select first cuisine...</option>
                    <option value="Italian">Italian</option>
                    <option value="Asian">Asian</option>
                    <option value="French">French</option>
                    <option value="Mexican">Mexican</option>
                    <option value="Indian">Indian</option>
                    <option value="Mediterranean">Mediterranean</option>
                    <option value="Romanian">Romanian</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Cuisine Type 2</label>
                <select name="cuisine2" class="form-select" required>
                    <option value="" disabled selected>Select second cuisine...</option>
                    <option value="Italian">Italian</option>
                    <option value="Asian">Asian</option>
                    <option value="French">French</option>
                    <option value="Mexican">Mexican</option>
                    <option value="Indian">Indian</option>
                    <option value="Mediterranean">Mediterranean</option>
                    <option value="Romanian">Romanian</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Difficulty Level</label>
                <select name="difficulty" class="form-select">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success">Save to XML</button>
                <a href="/recipes" class="btn btn-outline-secondary">Back to List</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
