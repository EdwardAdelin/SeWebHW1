<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Recipe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Add a New Recipe (Task 4)</h2>
        <form th:action="@{/add-recipe}" method="post" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label">Recipe Title</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Autumn Soup" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Cuisine Type 1</label>
                <input type="text" name="cuisine1" class="form-control" placeholder="e.g. Italian" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Cuisine Type 2</label>
                <input type="text" name="cuisine2" class="form-control" placeholder="e.g. French" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Difficulty Level</label>
                <select name="difficulty" class="form-select">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success">Save to XML</button>
                <a href="/recipes" class="btn btn-outline-secondary">Back to List</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
