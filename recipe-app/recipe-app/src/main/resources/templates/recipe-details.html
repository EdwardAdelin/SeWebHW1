<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recipe Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card shadow-sm p-4">
        <h2 th:text="${recipe.title}">Recipe Title</h2>
        <hr>
        <p><strong>Difficulty:</strong> <span th:text="${recipe.difficulty}" class="badge bg-secondary"></span></p>
        <p><strong>Cuisines:</strong></p>
        <ul>
            <li th:each="c : ${recipe.cuisines}" th:text="${c}"></li>
        </ul>
        <a href="/recipes" class="btn btn-outline-primary mt-3">Back to Recipes</a>
    </div>
</body>
</html>
